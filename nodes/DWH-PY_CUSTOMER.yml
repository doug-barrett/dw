    sourceMapping:
      - aliases: {}
        customSQL:
          customSQL: |
            CREATE OR REPLACE PROCEDURE "DOUG_DB"."DEV_STG"."PROC_PY_CUSTOMER" () 
            returns string not null 
            language python runtime_version = '3.8' 
            packages = ('snowflake-snowpark-python') 
            handler = 'stage_py' 
            execute as owner 
            as $$
            import snowflake.snowpark as snowpark
                
            def stage_py(snowpark_session):
                df_raw = snowpark_session.sql('''SELECT
                    "CUSTOMER"."C_CUSTKEY" AS "C_CUSTKEY", 
                    "CUSTOMER"."C_NAME" AS "C_NAME", 
                    "CUSTOMER"."C_ADDRESS" AS "C_ADDRESS", 
                    "CUSTOMER"."C_NATIONKEY" AS "C_NATIONKEY", 
                    "CUSTOMER"."C_PHONE" AS "C_PHONE", 
                    "CUSTOMER"."C_ACCTBAL" AS "C_ACCTBAL", 
                    "CUSTOMER"."C_MKTSEGMENT" AS "C_MKTSEGMENT", 
                    "CUSTOMER"."C_COMMENT" AS "C_COMMENT" 
                    FROM "SNOWFLAKE_SAMPLE_DATA"."TPCH_SF1"."CUSTOMER" "CUSTOMER" '''.rstrip())
                  
                df_filtered = df_raw.filter("C_ACCTBAL > 5000")
                df_distinct = df_filtered.distinct()
                df_final = df_distinct.na.drop(subset="C_PHONE")
                
                df_final.write.mode("overwrite").save_as_table('"DOUG_DB"."DEV_DWH"."PY_CUSTOMER"')
                return str(df_raw.count()) + " rows input - " +  str(df_final.count()) + " rows output"
            $$
        dependencies:
          - locationName: SRC_SAMPLE
            nodeName: CUSTOMER
        join:
          joinCondition: FROM {{ ref('SRC_SAMPLE', 'CUSTOMER') }} "CUSTOMER"
        name: PY_CUSTOMER
        noLinkRefs: []

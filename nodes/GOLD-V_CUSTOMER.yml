  database: ""
  deployEnabled: true
  description: |-
    1. This node merges customer data from the `DIM_CUSTOMER` dimension table. It provides a comprehensive view of customer information for analysis and reporting.
    2. Downstream applications include integrating customer data with sales and order data to track customer behavior and generate metrics, as well as enriching customer profiles with additional information.
    3. Key columns include `DIM_CUSTOMER_KEY` (surrogate key), `C_CUSTKEY` (business key), `C_NAME`, `C_ADDRESS`, `C_NATIONKEY` (foreign key referencing `NATION` table), `C_PHONE`, `C_ACCTBAL`, `C_ACCTBAL_CAT`, `C_MKTSEGMENT`, and `C_COMMENT`. These columns represent various aspects of customer attributes and financial information.
    4. The node applies no transformations to the source columns. It primarily combines information from the `DIM_CUSTOMER` table for consolidated analysis.

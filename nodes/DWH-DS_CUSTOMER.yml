    sourceMapping:
      - aliases: {}
        customSQL:
          customSQL: |-
            CREATE
            OR REPLACE PROCEDURE "DOUG_DB"."DEV_DWH"."PROC_DS_CUSTOMER" () returns string not null language sql as $$
                begin    
                    MERGE INTO "DOUG_DB"."DEV_DWH"."DS_CUSTOMER" "TGT"
                    USING (
                        SELECT
                        
                            
                                "STG_CUSTOMER"."CUSTOMER_CUSTKEY"
                            
                            AS "CUSTOMER_CUSTKEY", 
                        
                            
                                UPPER("STG_CUSTOMER"."CUSTOMER_NM")
                            
                            AS "CUSTOMER_NM", 
                        
                            
                                "STG_CUSTOMER"."CUSTOMER_ADDRESS"
                            
                            AS "CUSTOMER_ADDRESS", 
                        
                            
                                "STG_CUSTOMER"."CUSTOMER_NATIONKEY"
                            
                            AS "CUSTOMER_NATIONKEY", 
                        
                            
                                "STG_CUSTOMER"."CUSTOMER_PHONE"
                            
                            AS "CUSTOMER_PHONE", 
                        
                            
                                "STG_CUSTOMER"."CUSTOMER_ACCTBAL"
                            
                            AS "CUSTOMER_ACCTBAL", 
                        
                            
                                "STG_CUSTOMER"."CUSTOMER_MKTSEGMENT"
                            
                            AS "CUSTOMER_MKTSEGMENT", 
                        
                            
                                "STG_CUSTOMER"."CUSTOMER_COMMENT"
                            
                            AS "CUSTOMER_COMMENT", 
                        
                            
                                1
                            
                            AS "SYSTEM_VERSION", 
                        
                            
                                'Y'
                            
                            AS "SYSTEM_CURRENT_FLAG", 
                        
                            
                                CAST(CURRENT_TIMESTAMP AS TIMESTAMP)
                            
                            AS "SYSTEM_START_DATE", 
                        
                            
                                CAST('2999-12-31 00:00:00' AS TIMESTAMP)
                            
                            AS "SYSTEM_END_DATE", 
                        
                            
                                CAST(CURRENT_TIMESTAMP AS TIMESTAMP)
                            
                            AS "SYSTEM_CREATE_DATE", 
                        
                            
                                CAST(CURRENT_TIMESTAMP AS TIMESTAMP)
                            
                            AS "SYSTEM_UPDATE_DATE"
                        
                        FROM "DOUG_DB"."DEV_STG"."STG_CUSTOMER" "STG_CUSTOMER")
                        AS "SRC"
                    ON
                    
                        "SRC"."CUSTOMER_CUSTKEY" = "TGT"."CUSTOMER_CUSTKEY"
                    
                    WHEN MATCHED
                    
                        
                            AND (
                        
                        NVL( CAST("SRC"."CUSTOMER_NM" as STRING), '**NULL**') <> NVL( CAST("TGT"."CUSTOMER_NM" as STRING), '**NULL**')
                        
                    
                        
                            OR
                        
                        NVL( CAST("SRC"."CUSTOMER_ADDRESS" as STRING), '**NULL**') <> NVL( CAST("TGT"."CUSTOMER_ADDRESS" as STRING), '**NULL**')
                        
                    
                        
                            OR
                        
                        NVL( CAST("SRC"."CUSTOMER_NATIONKEY" as STRING), '**NULL**') <> NVL( CAST("TGT"."CUSTOMER_NATIONKEY" as STRING), '**NULL**')
                        
                    
                        
                            OR
                        
                        NVL( CAST("SRC"."CUSTOMER_PHONE" as STRING), '**NULL**') <> NVL( CAST("TGT"."CUSTOMER_PHONE" as STRING), '**NULL**')
                        
                    
                        
                            OR
                        
                        NVL( CAST("SRC"."CUSTOMER_ACCTBAL" as STRING), '**NULL**') <> NVL( CAST("TGT"."CUSTOMER_ACCTBAL" as STRING), '**NULL**')
                        
                    
                        
                            OR
                        
                        NVL( CAST("SRC"."CUSTOMER_MKTSEGMENT" as STRING), '**NULL**') <> NVL( CAST("TGT"."CUSTOMER_MKTSEGMENT" as STRING), '**NULL**')
                        
                    
                        
                            OR
                        
                        NVL( CAST("SRC"."CUSTOMER_COMMENT" as STRING), '**NULL**') <> NVL( CAST("TGT"."CUSTOMER_COMMENT" as STRING), '**NULL**')
                        
                            )
                        
                    
                    THEN UPDATE SET
                            "TGT"."CUSTOMER_NM" = "SRC"."CUSTOMER_NM"
                        , 
                    
                            "TGT"."CUSTOMER_ADDRESS" = "SRC"."CUSTOMER_ADDRESS"
                        , 
                    
                            "TGT"."CUSTOMER_NATIONKEY" = "SRC"."CUSTOMER_NATIONKEY"
                        , 
                    
                            "TGT"."CUSTOMER_PHONE" = "SRC"."CUSTOMER_PHONE"
                        , 
                    
                            "TGT"."CUSTOMER_ACCTBAL" = "SRC"."CUSTOMER_ACCTBAL"
                        , 
                    
                            "TGT"."CUSTOMER_MKTSEGMENT" = "SRC"."CUSTOMER_MKTSEGMENT"
                        , 
                    
                            "TGT"."CUSTOMER_COMMENT" = "SRC"."CUSTOMER_COMMENT"
                        , 
                    
                            "TGT"."SYSTEM_UPDATE_DATE" = "SRC"."SYSTEM_UPDATE_DATE"
                        
                    
                    WHEN NOT MATCHED THEN
                    INSERT (
                        "CUSTOMER_CUSTKEY"
                        , 
                    
                        "CUSTOMER_NM"
                        , 
                    
                        "CUSTOMER_ADDRESS"
                        , 
                    
                        "CUSTOMER_NATIONKEY"
                        , 
                    
                        "CUSTOMER_PHONE"
                        , 
                    
                        "CUSTOMER_ACCTBAL"
                        , 
                    
                        "CUSTOMER_MKTSEGMENT"
                        , 
                    
                        "CUSTOMER_COMMENT"
                        , 
                    
                        "SYSTEM_VERSION"
                        , 
                    
                        "SYSTEM_CURRENT_FLAG"
                        , 
                    
                        "SYSTEM_START_DATE"
                        , 
                    
                        "SYSTEM_END_DATE"
                        , 
                    
                        "SYSTEM_CREATE_DATE"
                        , 
                    
                        "SYSTEM_UPDATE_DATE"
                        
                    )
                    VALUES (
                        "SRC"."CUSTOMER_CUSTKEY"
                        , 
                    
                        "SRC"."CUSTOMER_NM"
                        , 
                    
                        "SRC"."CUSTOMER_ADDRESS"
                        , 
                    
                        "SRC"."CUSTOMER_NATIONKEY"
                        , 
                    
                        "SRC"."CUSTOMER_PHONE"
                        , 
                    
                        "SRC"."CUSTOMER_ACCTBAL"
                        , 
                    
                        "SRC"."CUSTOMER_MKTSEGMENT"
                        , 
                    
                        "SRC"."CUSTOMER_COMMENT"
                        , 
                    
                        "SRC"."SYSTEM_VERSION"
                        , 
                    
                        "SRC"."SYSTEM_CURRENT_FLAG"
                        , 
                    
                        "SRC"."SYSTEM_START_DATE"
                        , 
                    
                        "SRC"."SYSTEM_END_DATE"
                        , 
                    
                        "SRC"."SYSTEM_CREATE_DATE"
                        , 
                    
                        "SRC"."SYSTEM_UPDATE_DATE"
                        
                    );

                    RETURN 'Created procedure';
            	end;

            $$
        dependencies:
          - locationName: STAGE
            nodeName: STG_CUSTOMER
        join:
          joinCondition: FROM {{ ref('STAGE', 'STG_CUSTOMER') }} "STG_CUSTOMER"
        name: DS_CUSTOMER
        noLinkRefs: []

    sourceMapping:
      - aliases: {}
        customSQL:
          customSQL: |-
            CREATE OR REPLACE PROCEDURE "DOUG_DB"."DEV_DWH"."PROC_DS_CUSTOMER"() 
            returns string not null 
            language sql 
            as $$
                begin    
                    MERGE INTO "DOUG_DB"."DEV_DWH"."DS_CUSTOMER" "TGT"
                    USING (
                        SELECT "CUSTOMER"."C_CUSTKEY" AS "C_CUSTKEY",
                                UPPER("CUSTOMER"."C_NAME") AS "C_NAME", 
                                "CUSTOMER"."C_ADDRESS" AS "C_ADDRESS", 
                                "CUSTOMER"."C_NATIONKEY" AS "C_NATIONKEY", 
                                "CUSTOMER"."C_PHONE" AS "C_PHONE", 
                                "CUSTOMER"."C_ACCTBAL" AS "C_ACCTBAL", 
                                "CUSTOMER"."C_MKTSEGMENT" AS "C_MKTSEGMENT", 
                                "CUSTOMER"."C_COMMENT" AS "C_COMMENT"
                        FROM "SNOWFLAKE_SAMPLE_DATA"."TPCH_SF1"."CUSTOMER")
                        AS "SRC"
                    ON "SRC"."C_CUSTKEY" = "TGT"."C_CUSTKEY"
                    
                    WHEN MATCHED AND (
                        NVL( CAST("SRC"."C_NAME" as STRING), '**NULL**') <> NVL( CAST("TGT"."C_NAME" as STRING), '**NULL**') OR
                        NVL( CAST("SRC"."C_ADDRESS" as STRING), '**NULL**') <> NVL( CAST("TGT"."C_ADDRESS" as STRING), '**NULL**') OR
                        NVL( CAST("SRC"."C_NATIONKEY" as STRING), '**NULL**') <> NVL( CAST("TGT"."C_NATIONKEY" as STRING), '**NULL**') OR
                        NVL( CAST("SRC"."C_PHONE" as STRING), '**NULL**') <> NVL( CAST("TGT"."C_PHONE" as STRING), '**NULL**') OR
                        NVL( CAST("SRC"."C_ACCTBAL" as STRING), '**NULL**') <> NVL( CAST("TGT"."C_ACCTBAL" as STRING), '**NULL**') OR
                        NVL( CAST("SRC"."C_MKTSEGMENT" as STRING), '**NULL**') <> NVL( CAST("TGT"."C_MKTSEGMENT" as STRING), '**NULL**') OR
                        NVL( CAST("SRC"."C_COMMENT" as STRING), '**NULL**') <> NVL( CAST("TGT"."C_COMMENT" as STRING), '**NULL**'))
                              
                    THEN UPDATE SET
                        "TGT"."C_NAME" = "SRC"."C_NAME", 
                        "TGT"."C_ADDRESS" = "SRC"."C_ADDRESS", 
                        "TGT"."C_NATIONKEY" = "SRC"."C_NATIONKEY", 
                        "TGT"."C_PHONE" = "SRC"."C_PHONE", 
                        "TGT"."C_ACCTBAL" = "SRC"."C_ACCTBAL", 
                        "TGT"."C_MKTSEGMENT" = "SRC"."C_MKTSEGMENT", 
                        "TGT"."C_COMMENT" = "SRC"."C_COMMENT"

                    WHEN NOT MATCHED THEN
                    INSERT (
                        "C_CUSTKEY", 
                        "C_NAME", 
                        "C_ADDRESS", 
                        "C_NATIONKEY", 
                        "C_PHONE", 
                        "C_ACCTBAL", 
                        "C_MKTSEGMENT", 
                        "C_COMMENT"
                        )
                    VALUES (
                        "SRC"."C_CUSTKEY", 
                        "SRC"."C_NAME", 
                        "SRC"."C_ADDRESS", 
                        "SRC"."C_NATIONKEY", 
                        "SRC"."C_PHONE", 
                        "SRC"."C_ACCTBAL", 
                        "SRC"."C_MKTSEGMENT", 
                        "SRC"."C_COMMENT"
                        );

                    RETURN 'Created procedure';
            	end;

            $$

    sourceMapping:
    - name: STG_TRIPS
      join:
        joinCondition: "FROM {{ ref('SILVER', 'STG_TRIPS') }} \"STG_TRIPS\"\nLEFT JOIN {{ ref('GOLD', 'DIM_VENDOR') }} \"DIM_VENDOR\"\n  ON \"STG_TRIPS\".\"VENDOR_ID\" = \"DIM_VENDOR\".\"VENDOR_ID\"\n \
          \ AND \"DIM_VENDOR\".\"SYSTEM_CURRENT_FLAG\" = 'Y'\nLEFT JOIN {{ ref('GOLD', 'DIM_PAYMENT_TYPE') }} \"DIM_PAYMENT_TYPE\"\n  ON \"STG_TRIPS\".\"PAYMENT_TYPE_ID\" = \"DIM_PAYMENT_TYPE\".\"PAYMENT_TYPE_ID\"\
          \n  AND \"DIM_PAYMENT_TYPE\".\"SYSTEM_CURRENT_FLAG\" = 'Y'\nLEFT JOIN {{ ref('GOLD', 'DIM_RATE_CODE') }} \"DIM_RATE_CODE\"\n  ON \"STG_TRIPS\".\"RATE_CODE_ID\" = \"DIM_RATE_CODE\".\"RATE_CODE_ID\"\
          \n  AND \"DIM_RATE_CODE\".\"SYSTEM_CURRENT_FLAG\" = 'Y'\nLEFT JOIN {{ ref('GOLD', 'DIM_LOCATION') }} \"DIM_PU_LOCATION\"\n  ON \"STG_TRIPS\".\"PU_LOCATION_ID\" = \"DIM_PU_LOCATION\".\"LOCATION_ID\"\
          \n  AND \"DIM_PU_LOCATION\".\"SYSTEM_CURRENT_FLAG\" = 'Y'\nLEFT JOIN {{ ref('GOLD', 'DIM_LOCATION') }} \"DIM_DO_LOCATION\"\n  ON \"STG_TRIPS\".\"DO_LOCATION_ID\" = \"DIM_DO_LOCATION\".\"LOCATION_ID\"\
          \n  AND \"DIM_DO_LOCATION\".\"SYSTEM_CURRENT_FLAG\" = 'Y'"

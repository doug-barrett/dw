operation:
  database: ""
  deployEnabled: true
  description: 7-day vendor activity by pickup location zone (top 5 per vendor)
  locationName: SILVER
  metadata:
    sourceMapping:
      - name: STG_VENDOR_LOCATION_ACTIVITY_7
        join:
          joinCondition: |-
            FROM {{ ref('BRONZE', 'YELLOW_CAB_TRIPS') }} "YELLOW_CAB_TRIPS"
            JOIN {{ ref('BRONZE', 'LOCATION') }} "LOCATION"
              ON "YELLOW_CAB_TRIPS"."PU_LOCATION_ID" = "LOCATION"."LOCATION_ID"
            WHERE TO_DATE("YELLOW_CAB_TRIPS"."PICKUP_DATETIME") BETWEEN CURRENT_DATE - 7 AND CURRENT_DATE
            GROUP BY "YELLOW_CAB_TRIPS"."VENDOR_ID", "LOCATION"."ZONE"
            QUALIFY ROW_NUMBER() OVER (PARTITION BY "YELLOW_CAB_TRIPS"."VENDOR_ID", "LOCATION"."ZONE" ORDER BY SUM("YELLOW_CAB_TRIPS"."FARE_AMOUNT") DESC) <= 5
        dependencies:
          - locationName: BRONZE
            nodeName: YELLOW_CAB_TRIPS
          - locationName: BRONZE
            nodeName: LOCATION

    - name: STG_FACT_TRIPS
      join:
        joinCondition: |-
          FROM {{ ref('SILVER', 'STG_TRIPS') }} "STG_TRIPS"
          LEFT JOIN {{ ref_no_link('GOLD', 'DIM_VENDOR') }} "DIM_VENDOR"

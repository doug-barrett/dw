fileVersion: 1
id: "445"
isDisabled: false
metadata:
  defaultStorageLocation: SILVER
  error: null
  nodeMetadataSpec: |-
    capitalized: Copy of Stage
    short: STG
    plural: Stages
    tagColor: '#2EB67D'

    config:
    - groupName: Options
      items:
      - type: materializationSelector
        default: table
        options:
        - table
        - view
        isRequired: true

      - type: multisourceToggle
        enableIf: "{% if node.materializationType == 'table' %} true {% else %} false {% endif %}" 

      - type: overrideSQLToggle
        enableIf: "{% if node.materializationType == 'view' %} true {% else %} false {% endif %}"
        
      - displayName: Multi Source Strategy
        attributeName: insertStrategy
        type: dropdownSelector
        default: INSERT
        options:
        - "INSERT"
        - "UNION"
        - "UNION ALL"
        isRequired: true
        enableIf: "{% if node.isMultisource %} true {% else %} false {% endif %}"

      - displayName: Truncate Before
        attributeName: truncateBefore
        type: toggleButton
        default: true

      - displayName: Enable Tests
        attributeName: testsEnabled
        type: toggleButton
        default: true
        
      - displayName: Pre-SQL
        attributeName: preSQL
        type: textBox
        syntax: sql
        isRequired: false

      - displayName: Post-SQL
        attributeName: postSQL
        type: textBox
        syntax: sql
        isRequired: false

    systemColumns:
    - displayName: ETL_CREATE_DATE
      transform: CURRENT_TIMESTAMP()
      dataType: TIMESTAMP
      placement: end
      attributeName: isETLTS

    - displayName: ETL_USER
      transform: CURRENT_USER()
      dataType: STRING
      placement: end
      attributeName: isETLUser

    - displayName: ETL_TASK_RUN_ID
      transform: '{{parameters.etl_task_run_id}}'
      dataType: STRING
      placement: end
      attributeName: isETLRunID

    - displayName: ETL_HASH_BYTES
      transform: ''
      dataType: VARBINARY
      placement: end
      attributeName: isETLHash
name: Confie Stage
type: NodeType

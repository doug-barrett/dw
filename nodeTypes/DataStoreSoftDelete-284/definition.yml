fileVersion: 1
id: "284"
isDisabled: true
metadata:
  defaultStorageLocation: SILVER
  error: null
  nodeMetadataSpec: |
    capitalized: Copy of Persistent Stage
    short: DS
    plural: Persistent Stages
    tagColor: '#29B2DB'
        
    config:
    - groupName: Options
      items:
      - type: materializationSelector
        isRequired: true
        default: table
        options:
        - table
      
      - type: businessKeyColumns
        isRequired: false


      - displayName: Enable Tests
        attributeName: testsEnabled
        type: toggleButton
        default: true
        
      - displayName: Pre-SQL
        attributeName: preSQL
        type: textBox
        syntax: sql
        isRequired: false

      - displayName: Post-SQL
        attributeName: postSQL
        type: textBox
        syntax: sql
        isRequired: false

    systemColumns:

    - displayName: SYSTEM_DELETE_FLAG
      transform: ''
      dataType: VARCHAR
      placement: end
      attributeName: isSystemDeleteFlag

    - displayName: SYSTEM_VERSION
      transform: 'Y'
      dataType: NUMBER
      placement: end
      attributeName: isSystemVersion

    - displayName: SYSTEM_CURRENT_FLAG
      transform: ''
      dataType: VARCHAR
      placement: end
      attributeName: isSystemCurrentFlag

    - displayName: SYSTEM_START_DATE
      transform: CAST(CURRENT_TIMESTAMP AS TIMESTAMP)
      dataType: TIMESTAMP
      placement: end
      attributeName: isSystemStartDate

    - displayName: SYSTEM_END_DATE
      transform: CAST('2999-12-31 00:00:00' AS TIMESTAMP)
      dataType: TIMESTAMP
      placement: end
      attributeName: isSystemEndDate

    - displayName: SYSTEM_CREATE_DATE
      transform: CAST(CURRENT_TIMESTAMP AS TIMESTAMP)
      dataType: TIMESTAMP
      placement: end
      attributeName: isSystemCreateDate

    - displayName: SYSTEM_UPDATE_DATE
      transform: CAST(CURRENT_TIMESTAMP AS TIMESTAMP)
      dataType: TIMESTAMP
      placement: end
      attributeName: isSystemUpdateDate
name: Data Store Soft Delete
type: NodeType

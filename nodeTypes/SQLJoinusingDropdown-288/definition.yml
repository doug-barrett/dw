fileVersion: 1
id: "288"
isDisabled: false
metadata:
  defaultStorageLocation: STAGE
  error: null
  nodeMetadataSpec: |-
    capitalized: Copy of Copy of Copy of Copy of Functions
    short: V
    plural: Stages
    tagColor: '#2EB67D'

    joinTemplate: |
      FROM 
      {%- for dep in sources[0].dependencies %}
        {{ ref_raw(dep.node.location.name,dep.node.name) }} "{{ dep.node.name }}" {%- if not loop.last %},{%- endif %}
      {%- endfor %}  
      WHERE 
        {% if not config|length %}
        {% set config = {'tabJoins': {'items': []}} %}
        {% endif %}
        {%- for c in config.tabJoins.get('items') %}
            {%- if not loop.first %} AND {%- endif %} 
            "{{ c.colJoin1.name }}" = "{{ c.colJoin2.name }}"
        {%- endfor %}


    config:
    - groupName: Options

      items:
      - type: materializationSelector
        default: view
        options:
        - view
        isRequired: true
        enableIf: "false"

      - type: tabular
        displayName: 'Join Links'
        attributeName: tabJoins
        isRequired: false
        columns:
      
        - type: columnDropdownSelector
          displayName: Column 1
          attributeName: colJoin1
          isRequired: false

        - type: columnDropdownSelector
          displayName: Column 2
          attributeName: colJoin2
          isRequired: false
      
name: SQL Join using Dropdown
type: NodeType

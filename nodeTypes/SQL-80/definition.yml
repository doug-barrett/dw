fileVersion: 1
id: "80"
isDisabled: false
metadata:
  defaultStorageLocation: null
  error: null
  nodeMetadataSpec: |-
    capitalized: SQL
    short: SQL
    tagColor: gray
    plural: sql
    isColumnResyncEnabled: true

    config: 

    - groupName: Options 

      items:
      - displayName: Type
        type: materializationSelector
        default: view
        options:
        - table
        - view
        isRequired: false

      - displayName: SQL Deploy Time 
        attributeName: SQL_Deploy
        type: textBox 
        syntax: sql 
        isRequired: false    
        default: "CREATE OR REPLACE TABLE {{ ref_no_link('SILVER', 'STG_CUSTOMER') }} \n
        AS SELECT * FROM {{ ref_no_link('BRONZE', 'CUSTOMER') }} \n
      "

      - displayName: SQL Run Time 
        attributeName: SQL_Run
        type: textBox 
        syntax: sql 
        isRequired: false    
        default: "INSERT INTO {{ ref_no_link('SILVER', 'STG_CUSTOMER') }} \n
        SELECT * FROM {{ ref_no_link('BRONZE', 'CUSTOMER') }} \n
      "


    systemColumns:

    - displayName: TSTAMP
      transform: CURRENT_TIMESTAMP()
      dataType: TIMESTAMP
      placement: end
      attributeName: sysTS
name: SQL
type: NodeType

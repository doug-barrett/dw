fileVersion: 1
id: "289"
isDisabled: false
metadata:
  defaultStorageLocation: STAGE
  error: null
  nodeMetadataSpec: |
    capitalized: Copy of Stage
    short: TXM
    plural: Stages
    tagColor: '#2EB67D'

    joinTemplate: |
      {% for dep in sources[0].dependencies %}
        {%- if loop.first %} FROM {%- else %}  JOIN {%- endif %}
        {{ ref_raw(dep.node.location.name,dep.node.name) }} "{{ dep.node.name }}"
        {%- if not loop.first %} ON BLAH.BLAH = BLAH.BLAH {%- endif %}
      {% endfor %}
      JOIN {{ ref_raw("SRC_SAMPLE", "NATION")}} "NATION"
      ON NATION.N_NATIONKEY = BLEH.BLEH
      JOIN {{ ref_raw("SRC_SAMPLE", "REGION")}} "REGION"
      ON REGION.R_REGIONKEY = NATION.N_REGIONKEY
      

    config:
    - groupName: Options
      items:
      - type: materializationSelector
        default: table
        options:
        - table
        - view
        isRequired: true

      - type: multisourceToggle
        enableIf: "{% if node.materializationType == 'table' %} true {% else %} false {% endif %}" 

      - type: overrideSQLToggle
        enableIf: "{% if node.materializationType == 'view' %} true {% else %} false {% endif %}"
        
      - displayName: Multi Source Strategy
        attributeName: insertStrategy
        type: dropdownSelector
        default: INSERT
        options:
        - "INSERT"
        - "UNION"
        - "UNION ALL"
        isRequired: true
        enableIf: "{% if node.isMultisource %} true {% else %} false {% endif %}"

      - displayName: Truncate Before
        attributeName: truncateBefore
        type: toggleButton
        default: true

      - displayName: Enable Tests
        attributeName: testsEnabled
        type: toggleButton
        default: true
        
      - displayName: Pre-SQL
        attributeName: preSQL
        type: textBox
        syntax: sql
        isRequired: false

      - displayName: Post-SQL
        attributeName: postSQL
        type: textBox
        syntax: sql
        isRequired: false

    systemColumns:
    - displayName: REGION
      transform: 'REGION.R_NAME'
      dataType: STRING
      placement: end
      attributeName: isRegion

    - displayName: NATION
      transform: 'NATION.N_NAME'
      dataType: STRING
      placement: end
      attributeName: isNation
name: TXM Stage
type: NodeType
